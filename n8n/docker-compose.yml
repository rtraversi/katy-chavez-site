# KCL n8n + portal-postgres stack — shared-tenancy mode.
#
# Two services:
#   - postgres: internal-only DB for portal customer/case/person/document records
#   - n8n:     workflow engine + webhook surface, exposed via shared Traefik
#
# Traefik discovers the n8n container via the Docker socket and uses the labels
# below to route https://n8n.katychavez.com -> n8n:5678 with auto Let's Encrypt
# cert. Postgres has no host port and no Traefik labels — accessible only on the
# compose-internal network as `postgres:5432`.
#
# Requires (already in place on this VPS):
#   - traefik-traefik-1 running with --providers.docker=true and a "letsencrypt" certresolver
#   - DNS A record n8n.katychavez.com -> this VPS public IP
#   - Firewall already allowing 80/443 (do not reset it)

services:
  # KCL portal database. Internal-only — no host port, no Traefik labels.
  # n8n + future portal API reach it as `postgres:5432` on the compose network.
  # Stores customer/case/person/document/extracted_fields records (NOT n8n's
  # own state — n8n keeps its own SQLite in /home/node/.n8n).
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5678"
    environment:
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://${N8N_HOST}/
      N8N_EDITOR_BASE_URL: https://${N8N_HOST}/
      N8N_PROXY_HOPS: 1
      N8N_BASIC_AUTH_ACTIVE: "false"
      N8N_PAYLOAD_SIZE_MAX: 100
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 336
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      GENERIC_TIMEZONE: America/New_York
      TZ: America/New_York
      # Allow `fs` + `path` inside Code nodes so portal-submit can mkdir + write
      # uploads to /data/jobs/{jobId}/. Keep this list minimal — only what the
      # Code nodes in this stack actually need.
      NODE_FUNCTION_ALLOW_BUILTIN: fs,path
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_JWT_ISSUER: ${CLERK_JWT_ISSUER}
      # Portal DB connection (so n8n Postgres-node configs can pull from env).
      PORTAL_DB_HOST: postgres
      PORTAL_DB_PORT: 5432
      PORTAL_DB_USER: ${POSTGRES_USER}
      PORTAL_DB_PASSWORD: ${POSTGRES_PASSWORD}
      PORTAL_DB_NAME: ${POSTGRES_DB}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./forms:/data/forms:ro
      - ./jobs:/data/jobs
    labels:
      traefik.enable: "true"
      traefik.http.routers.kcl.entrypoints: websecure
      traefik.http.routers.kcl.rule: Host(`n8n.katychavez.com`)
      traefik.http.routers.kcl.tls.certresolver: letsencrypt
      traefik.http.services.kcl.loadbalancer.server.port: "5678"

volumes:
  n8n_data:
  postgres_data:
