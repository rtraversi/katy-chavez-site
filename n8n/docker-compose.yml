# KCL n8n stack — shared-tenancy mode.
# Routes through the host-level Traefik that BSR runs across all tenant n8n containers.
# Traefik discovers this container via the Docker socket and uses the labels below to
# route https://n8n.katychavez.com -> n8n:5678 with auto Let's Encrypt cert.
#
# Requires (already in place on this VPS):
#   - traefik-traefik-1 running with --providers.docker=true and a "letsencrypt" certresolver
#   - DNS A record n8n.katychavez.com -> this VPS public IP
#   - Firewall already allowing 80/443 (do not reset it)

services:
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678"
    environment:
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://${N8N_HOST}/
      N8N_EDITOR_BASE_URL: https://${N8N_HOST}/
      N8N_PROXY_HOPS: 1
      N8N_BASIC_AUTH_ACTIVE: "false"
      N8N_PAYLOAD_SIZE_MAX: 100
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 336
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      GENERIC_TIMEZONE: America/New_York
      TZ: America/New_York
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_JWT_ISSUER: ${CLERK_JWT_ISSUER}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./forms:/data/forms:ro
      - ./jobs:/data/jobs
    labels:
      traefik.enable: "true"
      traefik.http.routers.kcl.entrypoints: websecure
      traefik.http.routers.kcl.rule: Host(`n8n.katychavez.com`)
      traefik.http.routers.kcl.tls.certresolver: letsencrypt
      traefik.http.services.kcl.loadbalancer.server.port: "5678"

volumes:
  n8n_data:
