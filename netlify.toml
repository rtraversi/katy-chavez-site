[build]
  publish = "."

# Pretty URL for the portal landing page.
[[redirects]]
  from = "/portal"
  to = "/portal/index.html"
  status = 200

# Admin pretty URL.
[[redirects]]
  from = "/portal/admin"
  to = "/portal/admin.html"
  status = 200

# Common URL patterns crawlers/visitors guess at — redirect to homepage.
[[redirects]]
  from = "/home"
  to = "/"
  status = 301

[[redirects]]
  from = "/about-us"
  to = "/"
  status = 301

[[redirects]]
  from = "/about"
  to = "/"
  status = 301

[[redirects]]
  from = "/contact-us"
  to = "/"
  status = 301

[[redirects]]
  from = "/contact"
  to = "/"
  status = 301

[[redirects]]
  from = "/immigration"
  to = "/"
  status = 301

[[redirects]]
  from = "/criminal-law"
  to = "/"
  status = 301

[[redirects]]
  from = "/traffic-&-dwi"
  to = "/"
  status = 301

[[redirects]]
  from = "/reviews"
  to = "/"
  status = 301

# Security headers — applied to every response.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# Portal pages: keep them out of search indexes.
[[headers]]
  for = "/portal/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-store, no-cache, must-revalidate"
