<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Dev: Get Clerk JWT</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 2rem; max-width: 720px; margin-inline: auto; color: #1a1a1a; }
    h1 { font-size: 1.4rem; margin: 0 0 1rem; }
    p { color: #555; }
    .gate, .panel { padding: 1.5rem; border: 1px solid #ddd; border-radius: 12px; background: #fff; }
    .panel { margin-top: 1rem; }
    #clerk-signin { margin-top: 1rem; }
    .user { display: flex; align-items: center; gap: 0.75rem; }
    .user button { padding: 0.4rem 0.8rem; border-radius: 6px; border: 1px solid #ccc; background: #f7f7f7; cursor: pointer; }
    code, pre { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 0.85rem; }
    pre { background: #f4f4f4; padding: 1rem; border-radius: 8px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
    .row { display: flex; gap: 0.5rem; align-items: center; margin: 0.5rem 0; }
    button.primary { background: #2B3A52; color: white; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: 600; }
    button.primary:hover { background: #3a4d6e; }
    .hidden { display: none; }
    .small { font-size: 0.85rem; color: #777; }
  </style>
</head>
<body>
  <h1>Dev: Get Clerk session JWT</h1>
  <p>For local testing of the portal API endpoints. Log in below, then copy the JWT to use in curl as <code>Authorization: Bearer &lt;jwt&gt;</code>.</p>

  <div id="gate" class="gate">
    <p>Loading Clerk…</p>
    <div id="clerk-signin"></div>
  </div>

  <div id="panel" class="panel hidden">
    <div class="user">
      <span>Signed in as <strong id="email"></strong></span>
      <button id="signout">Sign out</button>
    </div>
    <div class="row">
      <button class="primary" id="refresh">Refresh token</button>
      <button id="copy">Copy</button>
      <span class="small" id="status"></span>
    </div>
    <pre id="jwt">…</pre>
    <p class="small">Tokens are short-lived (~60s). Click Refresh right before each curl.</p>
  </div>

  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_ZGVjZW50LXNlYWhvcnNlLTc4LmNsZXJrLmFjY291bnRzLmRldiQ"
    src="https://decent-seahorse-78.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
    type="text/javascript"
  ></script>
  <script>
    const gate = document.getElementById('gate');
    const panel = document.getElementById('panel');
    const emailEl = document.getElementById('email');
    const jwtEl = document.getElementById('jwt');
    const statusEl = document.getElementById('status');

    async function init() {
      while (typeof window.Clerk === 'undefined') { await new Promise(r => setTimeout(r, 50)); }
      await window.Clerk.load();
      render();
      window.Clerk.addListener(render);
    }

    async function render() {
      if (window.Clerk.user) {
        gate.classList.add('hidden');
        panel.classList.remove('hidden');
        emailEl.textContent = window.Clerk.user.primaryEmailAddress?.emailAddress || window.Clerk.user.id;
        await refreshToken();
      } else {
        gate.classList.remove('hidden');
        panel.classList.add('hidden');
        const target = document.getElementById('clerk-signin');
        target.innerHTML = '';
        window.Clerk.mountSignIn(target);
      }
    }

    async function refreshToken() {
      statusEl.textContent = 'refreshing…';
      try {
        const t = await window.Clerk.session.getToken();
        jwtEl.textContent = t || '(no token)';
        statusEl.textContent = 'fresh ' + new Date().toLocaleTimeString();
      } catch (e) {
        jwtEl.textContent = 'Error: ' + (e?.message || e);
        statusEl.textContent = '';
      }
    }

    document.getElementById('refresh').addEventListener('click', refreshToken);
    document.getElementById('signout').addEventListener('click', () => window.Clerk.signOut());
    document.getElementById('copy').addEventListener('click', async () => {
      await navigator.clipboard.writeText(jwtEl.textContent);
      statusEl.textContent = 'copied · ' + new Date().toLocaleTimeString();
    });

    init();
  </script>
</body>
</html>
